<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSS Animation</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      overflow:hidden;
      font-family:Arial, sans-serif;
    }

    .container{
      position:relative;
      width:300px;
      height:300px;
    }

    .circle{
      position:absolute;
      width:80px;
      height:80px;
      border-radius:50%;
      background:#38bdf8;
      animation:bounce 2s infinite ease-in-out;
      box-shadow:0 0 25px #38bdf8;
    }

    .circle:nth-child(2){
      background:#f472b6;
      left:110px;
      animation-delay:0.3s;
      box-shadow:0 0 25px #f472b6;
    }

    .circle:nth-child(3){
      background:#34d399;
      left:220px;
      animation-delay:0.6s;
      box-shadow:0 0 25px #34d399;
    }

    @keyframes bounce{
      0%{
        transform:translateY(0);
      }

      50%{
        transform:translateY(-150px) scale(1.1);
      }

      100%{
        transform:translateY(0);
      }
    }

    h1{
      position:absolute;
      bottom:-80px;
      width:100%;
      text-align:center;
      color:white;
      letter-spacing:3px;
      animation:glow 2s infinite alternate;
    }

    @keyframes glow{
      from{
        text-shadow:0 0 10px white;
      }

      to{
        text-shadow:
        0 0 20px #38bdf8,
        0 0 40px #38bdf8;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <h1>CSS Animation</h1>
  </div>

</body>
</html>
